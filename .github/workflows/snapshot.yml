# This is a basic workflow to help you get started with Actions

name: Bicep-snapshot

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  # This workflow contains a single job called "build"
  snapshot:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Run Bicep Snapshot
        shell: pswh
        run: |
          $ErrorActionPreference = 'Stop'
          $failed     = $false
          # One-time git identity setup
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git config user.name  'github-actions[bot]'
          Get-ChildItem -Path . -Filter *.bicepparam -Recurse -File |
              Where-Object { $_.FullName -notmatch '[\\/]\.git[\\/]' } |
              ForEach-Object {
                  $param    = $_.FullName
                  $snapshot = "$param.snapshot.json"
                  if (Test-Path $snapshot) {
                      Write-Host "VALIDATE: $param"
                      bicep snapshot $param --mode validate
                      if ($LASTEXITCODE -ne 0) { $failed = $true }
                  }
                  else {
                      Write-Host "OVERWRITE: $param"
                      bicep snapshot $param --mode overwrite
                      if ($LASTEXITCODE -ne 0) { $failed = $true; return }
                  }
              }
          git add $snapshot
          git commit -m "chore: add bicep snapshots"
          git push origin "HEAD:$env:GITHUB_HEAD_REF"
          if ($failed) { exit 1 }
