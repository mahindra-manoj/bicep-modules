name: Publish Private Endpoint Bicep module

on:
    workflow_dispatch:
#    pull_request:
#        branches:
#            - main
#        paths:
#            - 'PrivateEndpoint/**'
#            - 'utilities.bicep'
#            - '.github/workflows/private-endpoint.yml'
#    push:
#        branches:
#            - main
#        paths:
#            - 'PrivateEndpoint/**'
#            - 'utilities.bicep'
#            - '.github/workflows/private-endpoint.yml'
jobs:
    private-endpoint:
        permissions:
            contents: read
            id-token: write
        uses: ./.github/workflows/bicep-publish.yml
        secrets:
            azure-client-id: ${{ secrets.ClIENT_ID }}
            azure-tenant-id: ${{ secrets.TENANT_ID }}
            azure-subscription-id: ${{ secrets.SUBSCRIPTION_ID }}
        with:
            bicep-file-path: PrivateEndpoint/
            registry-name: crmahi
            registry-path: network/private-endpoint:1.0
